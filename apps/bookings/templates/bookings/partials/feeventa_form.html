<form hx-post="{% url 'bookings:fee_venta_add' venta_pk=venta_pk %}" hx-target="#venta-totals-card" hx-swap="innerHTML"
    @htmx:after-request="$dispatch('close-modal'); window.location.reload();" class="space-y-4">
    {% csrf_token %}

    <div class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-400 mb-1.5">Tipo de Fee</label>
            <select name="tipo_fee"
                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white focus:ring-2 focus:ring-blue-500 transition-all appearance-none">
                <option value="AGENCIA">Fee Agencia</option>
                <option value="SERVICIO">Fee por Servicio</option>
                <option value="OTRO">Otros Cargos</option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-400 mb-1.5">Monto (USD)</label>
            <input type="number" step="0.01" name="monto" required
                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white focus:ring-2 focus:ring-blue-500 transition-all font-bold text-blue-400">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-400 mb-1.5">Descripción</label>
            <input type="text" name="descripcion" placeholder="Ej: Fee por emisión urgente"
                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white focus:ring-2 focus:ring-blue-500 transition-all">
        </div>
    </div>

    <div class="flex justify-end gap-3 pt-6 border-t border-white/10 mt-6">
        <button type="button" @click="$dispatch('close-modal')"
            class="px-6 py-2 rounded-xl text-gray-400 hover:text-white transition-all">
            Cancelar
        </button>
        <button type="submit"
            class="px-8 py-2 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white font-bold shadow-lg shadow-indigo-900/20 transition-all">
            Agregar Fee
        </button>
    </div>
</form>

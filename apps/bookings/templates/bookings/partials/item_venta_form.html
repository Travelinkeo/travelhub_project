<form hx-post="{{ request.path }}" hx-target="#venta-totals-card" hx-swap="innerHTML"
    @htmx:after-request="$dispatch('close-modal'); window.location.reload();" class="space-y-4">
    {% csrf_token %}

    <div class="space-y-4">
        {% if not object %}
        <div>
            <label class="block text-sm font-medium text-gray-400 mb-1.5">Producto / Servicio</label>
            {{ form.producto_servicio }}
        </div>
        {% endif %}

        <div>
            <label class="block text-sm font-medium text-gray-400 mb-1.5">Descripción Personalizada</label>
            <input type="text" name="descripcion_personalizada"
                value="{{ form.descripcion_personalizada.value|default:'' }}"
                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white focus:ring-2 focus:ring-blue-500 transition-all">
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1.5">Cantidad</label>
                <input type="number" name="cantidad" value="{{ form.cantidad.value|default:1 }}"
                    class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white focus:ring-2 focus:ring-blue-500 transition-all">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1.5">Precio de Venta</label>
                <input type="number" step="0.01" name="precio_unitario_venta"
                    value="{{ form.precio_unitario_venta.value|default:'0.00' }}"
                    class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white focus:ring-2 focus:ring-blue-500 transition-all font-bold text-blue-400">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1.5">Costo Neto (Prov)</label>
                <input type="number" step="0.01" name="costo_neto_proveedor"
                    value="{{ form.costo_neto_proveedor.value|default:'0.00' }}"
                    class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white focus:ring-2 focus:ring-blue-500 transition-all">
            </div>
            {% if not object %}
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1.5">Proveedor</label>
                {{ form.proveedor_servicio }}
            </div>
            {% endif %}
        </div>
    </div>

    <div class="flex justify-end gap-3 pt-6 border-t border-white/10 mt-6">
        <button type="button" @click="$dispatch('close-modal')"
            class="px-6 py-2 rounded-xl text-gray-400 hover:text-white transition-all">
            Cancelar
        </button>
        <button type="submit"
            class="px-8 py-2 rounded-xl bg-blue-600 hover:bg-blue-500 text-white font-bold shadow-lg shadow-blue-900/20 transition-all">
            Guardar Cambios
        </button>
    </div>
</form>

<script>
    // Style selects inside modal
    document.querySelectorAll('#modal-content select').forEach(s => {
        s.className = "w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white focus:ring-2 focus:ring-blue-500 transition-all appearance-none";
    });
</script>

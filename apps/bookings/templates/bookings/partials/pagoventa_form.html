<form hx-post="{% url 'bookings:pago_venta_add' venta_pk=venta_pk %}" hx-target="#venta-totals-card" hx-swap="innerHTML"
    enctype="multipart/form-data" @htmx:after-request="$dispatch('close-modal'); window.location.reload();"
    class="space-y-4">
    {% csrf_token %}

    <div class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-400 mb-1.5">Monto Pagado (USD)</label>
            <input type="number" step="0.01" name="monto" required
                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white focus:ring-2 focus:ring-blue-500 transition-all font-bold text-green-400">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-400 mb-1.5">Método de Pago</label>
            <select name="metodo_pago"
                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white focus:ring-2 focus:ring-blue-500 transition-all appearance-none">
                <option value="EF">Efectivo</option>
                <option value="TR">Transferencia</option>
                <option value="ZP">Zelle</option>
                <option value="BN">Binance Pay</option>
                <option value="OT">Otro</option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-400 mb-1.5">Referencia</label>
            <input type="text" name="referencia" placeholder="Nro de confirmación o transferencia"
                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white focus:ring-2 focus:ring-blue-500 transition-all">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-400 mb-1.5">Comprobante (Imagen/PDF)</label>
            <input type="file" name="comprobante"
                class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-500 transition-all">
        </div>
    </div>

    <div class="flex justify-end gap-3 pt-6 border-t border-white/10 mt-6">
        <button type="button" @click="$dispatch('close-modal')"
            class="px-6 py-2 rounded-xl text-gray-400 hover:text-white transition-all">
            Cancelar
        </button>
        <button type="submit"
            class="px-8 py-2 rounded-xl bg-green-600 hover:bg-green-500 text-white font-bold shadow-lg shadow-green-900/20 transition-all">
            Registrar Pago
        </button>
    </div>
</form>

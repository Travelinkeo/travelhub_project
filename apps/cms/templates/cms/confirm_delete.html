{% extends "base_modern.html" %}
{% load i18n %}

{% block content %}
<div class="max-w-xl mx-auto p-6 flex items-center justify-center min-h-[60vh]">
    <div class="bg-slate-800/50 border border-slate-700 p-10 rounded-3xl backdrop-blur-md shadow-2xl text-center">
        <div class="w-20 h-20 bg-red-500/20 rounded-full flex items-center justify-center text-red-400 mx-auto mb-6">
            <svg class="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
        </div>

        <h1 class="text-2xl font-bold text-white mb-4">¿Confirmar Eliminación?</h1>
        <p class="text-gray-400 mb-8">
            Estás a punto de eliminar permanentemente este contenido. Esta acción no se puede deshacer.
        </p>

        <form method="post" class="flex flex-col sm:flex-row justify-center gap-4">
            {% csrf_token %}
            <a href="{% url 'cms:dashboard' %}"
                class="px-8 py-3 rounded-2xl border border-slate-700 text-gray-400 hover:bg-slate-700/30 transition-all font-medium">
                Cancelar
            </a>
            <button type="submit"
                class="px-10 py-3 rounded-2xl bg-red-600 text-white shadow-lg shadow-red-900/30 hover:bg-red-700 transition-all font-bold">
                Eliminar Permanentemente
            </button>
        </form>
    </div>
</div>
{% endblock %}

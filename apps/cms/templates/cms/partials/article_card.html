{% load humanize %}
<div
    class="bg-slate-800/40 border border-slate-700/50 rounded-3xl overflow-hidden backdrop-blur-sm hover:border-purple-500/50 transition-all group shadow-xl">
    <div class="p-8">
        <div class="flex justify-between items-start mb-4">
            <span
                class="px-3 py-1 bg-purple-500/10 text-purple-400 text-xs font-bold rounded-full border border-purple-500/20">
                {{ articulo.destino }}
            </span>
            <span class="text-gray-500 text-xs">{{ articulo.fecha_creacion|naturaltime }}</span>
        </div>

        <div class="flex justify-between items-start mb-4">
            <h2 class="text-2xl font-bold text-white group-hover:text-purple-300 transition-colors">
                {{ articulo.titulo }}
            </h2>
            <div class="flex gap-2">
                <a href="{% url 'cms:articulo_update' articulo.pk %}"
                    class="p-2 bg-slate-700/50 hover:bg-slate-700 text-blue-400 rounded-lg transition-colors">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                    </svg>
                </a>
                <a href="{% url 'cms:articulo_delete' articulo.pk %}"
                    class="p-2 bg-slate-700/50 hover:bg-slate-700 text-red-400 rounded-lg transition-colors">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                </a>
            </div>
        </div>

        <p class="text-gray-400 leading-relaxed mb-6">
            {{ articulo.resumen }}
        </p>

        <div class="flex items-center gap-4 border-t border-slate-700 pt-6">
            <button
                class="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-xl transition text-sm">
                Ver Contenido Completo
            </button>
            <button hx-post="{% url 'cms:generate_social_posts' articulo.pk %}"
                hx-target="#social-container-{{ articulo.pk }}" hx-swap="innerHTML"
                class="flex items-center justify-center bg-purple-600/20 hover:bg-purple-600 text-purple-400 hover:text-white px-4 py-3 rounded-xl border border-purple-600/30 transition">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
                </svg>
            </button>
        </div>

        <!-- Social Container -->
        <div id="social-container-{{ articulo.pk }}" class="mt-6 space-y-4">
            <!-- Los posts se cargarán aquí -->
        </div>
    </div>
</div>

<div id="vincular-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm" @click="showVincularModal = false"></div>
    <div
        class="relative bg-slate-800 border border-slate-700 w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden animate-in zoom-in duration-200">
        <div class="p-6 border-b border-slate-700 flex justify-between items-center">
            <h3 class="text-xl font-bold text-white">Vincular Pasajero</h3>
            <button @click="showVincularModal = false" class="text-gray-400 hover:text-white">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
        </div>

        <div class="p-6 space-y-4">
            <div class="space-y-2">
                <label class="text-sm font-medium text-gray-400">Buscar Pasajero (Nombre o Documento)</label>
                <input type="text" name="q" placeholder="Escribe para buscar..."
                    hx-get="{% url 'crm:pasajero_search' %}" hx-trigger="keyup changed delay:300ms"
                    hx-target="#search-results"
                    class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-blue-500 transition">
            </div>

            <div id="search-results" class="max-h-60 overflow-y-auto space-y-2">
                <p class="text-gray-500 text-sm text-center py-4">Empieza a escribir para buscar pasajeros...</p>
            </div>
        </div>

        <div class="p-6 bg-slate-900/50 border-t border-slate-700 flex justify-between items-center">
            <a href="{% url 'crm:pasajero_create' %}" class="text-blue-400 hover:text-blue-300 text-sm font-semibold">
                + Crear Nuevo Pasajero
            </a>
            <button @click="showVincularModal = false"
                class="px-6 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-xl font-bold transition">
                Cerrar
            </button>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();
</script>

{% if role == 'user' %}
<div class="flex justify-end mb-4 px-4">
    <div
        class="bg-indigo-600 text-white p-3 rounded-2xl rounded-tr-none max-w-[85%] shadow-lg shadow-indigo-600/10 text-sm">
        {{ content }}
    </div>
</div>
{% else %}
<div class="flex justify-start mb-4 px-4">
    <div
        class="bg-slate-800 border border-slate-700 text-gray-200 p-3 rounded-2xl rounded-tl-none max-w-[85%] shadow-xl text-sm leading-relaxed">
        <div class="flex items-center gap-2 mb-1">
            <div class="w-5 h-5 bg-indigo-500 rounded-full flex items-center justify-center">
                <svg class="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
            <span class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">Auditor AI</span>
        </div>
        {{ content|linebreaksbr }}
    </div>
</div>
{% endif %}

{% load i18n %}

{% if role == 'user' %}
<div class="flex items-start justify-end gap-4 px-4 mb-4">
    <div class="bg-emerald-600 rounded-3xl rounded-tr-none p-4 shadow-lg max-w-[85%]">
        <p class="text-white text-sm leading-relaxed">{{ content }}</p>
    </div>
</div>
{% else %}
<div class="flex items-start gap-4 px-4 mb-4">
    <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-emerald-800 to-black flex items-center justify-center flex-shrink-0 shadow-lg border border-emerald-400/20">
        <span class="text-xs font-bold text-emerald-400">AI</span>
    </div>
    <div class="bg-emerald-950/40 rounded-3xl rounded-tl-none p-5 border border-emerald-500/10 shadow-xl max-w-[85%]">
        <div class="flex items-center gap-2 mb-2">
            <span class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest">CFO Virtual AI</span>
        </div>
        <div class="prose prose-sm prose-invert text-emerald-50 leading-relaxed font-light">
            {{ content|linebreaks }}
        </div>
        
        {% if suggestion_entry %}
        <div class="mt-4 pt-4 border-t border-emerald-500/20">
            <pre class="bg-black/40 p-3 rounded-xl text-[11px] text-emerald-400 overflow-x-auto border border-emerald-500/10">{{ suggestion_entry|safe }}</pre>
            <button class="mt-3 text-[11px] font-bold text-emerald-300 bg-emerald-900/40 px-3 py-2 rounded-lg hover:bg-emerald-800/50 transition-all border border-emerald-500/20">
                Aplicar Asiento
            </button>
        </div>
        {% endif %}
    </div>
</div>
{% endif %}

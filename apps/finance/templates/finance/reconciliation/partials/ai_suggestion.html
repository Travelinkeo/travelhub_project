<div class="p-6 flex flex-col md:flex-row gap-6 animate-fade-in">
    <!-- Explicación de la IA -->
    <div class="flex-1">
        <div class="flex items-center gap-2 mb-3">
            <span class="p-1.5 bg-indigo-500 rounded-lg">
                <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </span>
            <h4 class="text-sm font-bold text-indigo-300 uppercase tracking-wider">Análisis de Inteligencia Artificial
            </h4>
        </div>
        <p class="text-gray-300 text-sm leading-relaxed">
            {{ suggestion.explicacion }}
        </p>
    </div>

    <!-- Ajuste Sugerido -->
    <div class="md:w-72 bg-slate-900/50 rounded-2xl p-4 border border-indigo-500/10">
        <h5 class="text-[10px] font-bold text-gray-500 uppercase mb-2">Ajuste Contable Sugerido</h5>
        <div class="text-white font-mono text-sm mb-4">
            {{ suggestion.ajuste_sugerido }}
        </div>
        <button
            class="w-full py-2 bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold rounded-lg transition-all shadow-lg shadow-emerald-600/20">
            Aplicar Ajuste
        </button>
    </div>
</div>

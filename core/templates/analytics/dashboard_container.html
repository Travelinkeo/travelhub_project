{% extends "base_modern.html" %}
{% load static %}

{% block title %}Reportes y Analíticas{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <!-- Header -->
    <div class="md:flex md:items-center md:justify-between mb-6">
        <div class="flex-1 min-w-0">
            <h2 class="text-2xl font-bold leading-7 text-white sm:text-3xl sm:truncate">
                Reportes y Analíticas
            </h2>
            <p class="mt-1 text-sm text-gray-400">
                Visión unificada del rendimiento de tu agencia.
            </p>
        </div>
    </div>

    <!-- Tabs Navigation -->
    <div class="mb-6 border-b border-gray-700">
        <nav class="-mb-px flex space-x-8" aria-label="Tabs">
            <a href="#" hx-get="{% url 'core:analytics_sales' %}" hx-target="#analytics-content" hx-swap="innerHTML"
                class="border-indigo-500 text-indigo-400 whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm transition-colors duration-200"
                id="tab-sales" onclick="selectTab(this)">
                Ventas
            </a>

            <a href="#" hx-get="{% url 'core:analytics_finance' %}" hx-target="#analytics-content" hx-swap="innerHTML"
                class="border-transparent text-gray-400 hover:text-gray-200 hover:border-gray-300 whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm transition-colors duration-200"
                id="tab-finance" onclick="selectTab(this)">
                Finanzas (P&L)
            </a>

            <a href="#" hx-get="{% url 'core:analytics_ops' %}" hx-target="#analytics-content" hx-swap="innerHTML"
                class="border-transparent text-gray-400 hover:text-gray-200 hover:border-gray-300 whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm transition-colors duration-200"
                id="tab-ops" onclick="selectTab(this)">
                Operaciones
            </a>
        </nav>
    </div>

    <!-- Content Area -->
    <div id="analytics-content" class="min-h-[400px]">
        <!-- Loading State -->
        <div class="flex justify-center items-center h-64">
            <svg class="animate-spin -ml-1 mr-3 h-8 w-8 text-indigo-500" xmlns="http://www.w3.org/2000/svg" fill="none"
                viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                </path>
            </svg>
        </div>
    </div>

</div>

{% block extra_scripts %}
<script>
    function selectTab(clickedTab) {
        // Reset all tabs
        document.querySelectorAll('nav a').forEach(tab => {
            tab.classList.remove('border-indigo-500', 'text-indigo-400');
            tab.classList.add('border-transparent', 'text-gray-400', 'hover:text-gray-200', 'hover:border-gray-300');
        });

        // Activate clicked tab
        clickedTab.classList.remove('border-transparent', 'text-gray-400', 'hover:text-gray-200', 'hover:border-gray-300');
        clickedTab.classList.add('border-indigo-500', 'text-indigo-400');
    }

    // Load default tab
    document.addEventListener('DOMContentLoaded', function () {
        htmx.ajax('GET', "{% url 'core:analytics_sales' %}", '#analytics-content');
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% endblock %}
{% endblock %}

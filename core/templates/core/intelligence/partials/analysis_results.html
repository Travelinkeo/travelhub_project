{% load humanize %}

<!-- DATOS SEGUROS INYECTADOS VÍA JSON (Única fuente de verdad para Alpine) -->
{{ data|json_script:"gds-analysis-data" }}

<!-- COMPONENTE REACTIVO ALPINE.JS (Multipax Edition) -->
<div x-data="{
        boletos: [],
        resumenGDS: { tarifa: 0, impuestos: 0, total: 0 },
        pagadorId: null,
        fProvPax: 0, // Fee Mayorista POR PASAJERO
        fIntPax: 0,  // Fee Agencia POR PASAJERO
        subtotal: 0,
        igtf: 0,
        totalFinal: 0,
        btnFotoText: 'DESCARGAR CONFIRMACIÓN',
        btnErpText: 'INYECTAR VENTA AL ERP',
        processing: false,
        
        init() {
            window.addEventListener('set-pagador', (e) => { this.pagadorId = e.detail; });

            const rawResponse = JSON.parse(document.getElementById('gds-analysis-data').textContent);
            
            // Si la IA devolvió el formato nuevo, usamos 'boletos'. Si es viejo, lo envolvemos.
            if (rawResponse.boletos && Array.isArray(rawResponse.boletos)) {
                this.boletos = rawResponse.boletos;
            } else if (rawResponse.itinerario) {
                this.boletos = [rawResponse];
            }

            // Consolidar totales del GDS de todos los pasajeros
            this.boletos.forEach(b => {
                this.resumenGDS.tarifa += this.p(b.tarifa);
                this.resumenGDS.impuestos += this.p(b.impuestos);
                this.resumenGDS.total += this.p(b.total);
            });
            
            this.recalc();
        },

        p(v) {
            if (v === undefined || v === null) return 0;
            let s = v.toString().trim();
            if (s.includes(',') && s.includes('.')) s = s.replace(/\./g, '').replace(',', '.');
            else if (s.includes(',')) s = s.replace(',', '.');
            s = s.replace(/[^0-9.]/g, '');
            return parseFloat(s) || 0;
        },

        recalc() {
            // El usuario coloca el fee de un pasajero, lo multiplicamos por el número de pasajeros
            const numPax = this.boletos.length || 1;
            const totalFProv = (Number(this.fProvPax) || 0) * numPax;
            const totalFInt = (Number(this.fIntPax) || 0) * numPax;

            this.subtotal = this.resumenGDS.total + totalFProv + totalFInt;
            this.igtf = this.subtotal * 0.03;
            this.totalFinal = this.subtotal + this.igtf;
        },

        fmt(n) { 
            return (n || 0).toLocaleString('es-VE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        },
        
        async inyectarERP() {
            this.processing = true;
            this.btnErpText = 'INYECTANDO ' + this.boletos.length + ' PAX...';
            
            // Calculamos los totales para enviar al backend (el backend espera el total grupal o prorrateado según diseño)
            // Mantendremos el envío del total grupal de fees ya que el backend actual los prorratea.
            const numPax = this.boletos.length || 1;
            const payload = {
                analysis_data: JSON.parse(document.getElementById('gds-analysis-data').textContent),
                pagador_id: this.pagadorId,
                user_fees: { 
                    fee_proveedor: (Number(this.fProvPax) || 0) * numPax, 
                    fee_interno: (Number(this.fIntPax) || 0) * numPax 
                }
            };
            try {
                const csrf = document.querySelector('[name=csrfmiddlewaretoken]').value;
                const res = await fetch('/intelligence/gds-analyzer/inject/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrf },
                    body: JSON.stringify(payload)
                });
                const r = await res.json();
                if(r.status === 'success') {
                    window.location.href = r.redirect_url;
                } else {
                    alert('Error: ' + r.message);
                }
            } catch(e) { alert('Error de red'); }
            this.processing = false;
            this.btnErpText = 'INYECTAR VENTA AL ERP';
        },

        descargarFoto() {
            if(this.processing) return;
            this.processing = true;
            this.btnFotoText = 'CAPTURANDO...';
            html2canvas(document.getElementById('panel-a-capturar'), { 
                backgroundColor: '#0a0d12', scale: 2, useCORS: false, logging: false, allowTaint: true
            }).then(canvas => {
                let a = document.createElement('a');
                const pnr = this.boletos[0]?.codigo_reserva || 'PNR';
                a.download = 'Confirmacion_' + pnr + '.png';
                a.href = canvas.toDataURL('image/png');
                a.click();
                this.btnFotoText = 'DESCARGAR CONFIRMACIÓN';
                this.processing = false;
            }).catch(err => {
                this.btnFotoText = 'REINTENTAR';
                this.processing = false;
            });
        }
     }" 
     class="flex flex-col gap-6 animate-slide-up w-full">
    
    <!-- ZONA DE LA FOTO (Captura todos los pasajeros) -->
    <div id="panel-a-capturar" class="space-y-6 bg-[#0a0d12] p-6 rounded-xl border border-gray-800 relative z-10">
        
        <!-- Header de la Agencia en la captura -->
        <div class="flex justify-between items-center border-b border-gray-800 pb-4">
            <!-- Código de reserva movido a la izquierda (antes era TRAVELHUB OBSIDIAN) -->
            <div>
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Código de Reserva</p>
                <p class="text-2xl font-black text-white" x-text="boletos[0]?.codigo_reserva || '---'"></p>
            </div>
            <!-- Lado derecho intencionalmente vacío para no exponer info interna -->
            <div></div>
        </div>

        <!-- Iterar sobre los pasajeros detectados -->
        <template x-for="(boleto, index) in boletos" :key="index">
            <div class="space-y-4 animate-fade-in mb-6 last:mb-0">
                <!-- Tarjeta del Pasajero -->
                <div class="bg-surface-1 rounded-xl p-5 border border-border-color shadow-sm">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex items-center gap-3">
                            <div class="size-10 rounded-full bg-primary/10 flex items-center justify-center text-primary">
                                <span class="material-symbols-outlined">person_pin</span>
                            </div>
                            <div>
                                <h3 class="text-xs font-bold text-text-muted uppercase tracking-wider mb-0.5" x-text="'Pasajero ' + (index + 1)"></h3>
                                <p class="text-xl font-black text-white" x-text="boleto.nombre_pasajero"></p>
                            </div>
                        </div>
                        <template x-if="boleto.numero_boleto">
                            <span class="px-2 py-0.5 rounded bg-emerald-500/10 text-emerald-400 text-[9px] font-black border border-emerald-500/20 tracking-widest" x-text="boleto.numero_boleto"></span>
                        </template>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="p-2 rounded bg-black/30 border border-gray-800">
                            <p class="text-[9px] text-gray-500 uppercase font-bold mb-0.5">Identificación</p>
                            <p class="text-sm font-bold text-gray-300" x-text="boleto.codigo_identificacion || 'No especificado'"></p>
                        </div>
                        <div class="p-2 rounded bg-black/30 border border-gray-800 text-right">
                            <p class="text-[9px] text-gray-500 uppercase font-bold mb-0.5">Total</p>
                            <!-- Lee totalFinal (Total Venta ERP = GDS + Fees + IGTF) -->
                            <!-- NO usar boleto.total (tarifa GDS) porque genera doble conteo -->
                            <p class="text-sm font-bold text-primary" x-text="fmt(totalFinal) + ' ' + (boleto.moneda || 'USD')"></p>
                        </div>
                    </div>
                </div>

                <!-- Itinerario (Solo el primero por optimización) -->
                <template x-if="index === 0">
                    <div class="bg-surface-1 rounded-xl p-5 border border-border-color shadow-sm space-y-4">
                        <template x-for="seg in boleto.itinerario" :key="seg.numero_vuelo">
                            <div class="bg-[#111827] rounded-xl p-6 border border-gray-800 shadow-inner relative overflow-hidden">
                                <div class="flex justify-between items-center w-full relative z-10">
                                    <div class="flex flex-col w-1/3">
                                        <span class="text-[9px] text-gray-500 uppercase font-black tracking-widest mb-1">SALIDA</span>
                                        <span class="font-mono font-black text-blue-400 text-2xl leading-none" x-text="seg.hora_salida || '--:--'"></span>
                                        <span class="text-[11px] text-gray-300 font-bold" x-text="seg.origen_ciudad"></span>
                                        <span class="text-[10px] text-gray-500 font-mono" x-text="seg.fecha_salida"></span>
                                    </div>

                                    <div class="flex flex-col items-center justify-center w-1/3 px-2">
                                        <div class="flex items-center gap-1 text-primary text-[10px] font-black mb-1 p-1 bg-primary/5 rounded border border-primary/10">
                                            <span x-text="seg.aerolinea + ' ' + seg.numero_vuelo"></span>
                                        </div>
                                        <div class="relative w-full flex items-center justify-center py-2">
                                            <div class="absolute inset-0 flex items-center"><div class="w-full border-b border-dashed border-gray-700"></div></div>
                                            <div class="relative bg-[#111827] px-2"><span class="material-symbols-outlined text-primary text-xl rotate-90 scale-125">flight</span></div>
                                        </div>
                                    </div>

                                    <div class="flex flex-col w-1/3 text-right">
                                        <span class="text-[9px] text-gray-500 uppercase font-black tracking-widest mb-1">LLEGADA</span>
                                        <span class="font-mono font-black text-orange-400 text-2xl leading-none" x-text="seg.hora_llegada || '--:--'"></span>
                                        <span class="text-[11px] text-gray-300 font-bold" x-text="seg.destino_ciudad"></span>
                                        <span class="text-[10px] text-gray-500 font-mono" x-text="seg.fecha_llegada"></span>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
            </div>
        </template>
    </div> 

    <!-- Tarjeta Financiera (Consolidada) -->
    <div class="bg-surface-1 rounded-xl p-6 border-t-4 border-t-primary shadow-lg border border-gray-800">
        <div class="flex items-center justify-between mb-6">
            <h3 class="text-sm font-black text-gray-400 uppercase tracking-widest">Resumen Financiero Grupal</h3>
            <span class="text-[10px] font-bold text-primary px-2 py-0.5 bg-primary/10 rounded-full border border-primary/20" x-text="boletos.length + ' PASAJERO(S)'"></span>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="space-y-4 bg-[#111827] p-5 rounded-xl border border-gray-800/50">
                <div class="flex justify-between items-center text-sm">
                    <span class="text-gray-400 font-medium">Total Tarifas GDS</span>
                    <span class="font-mono font-bold text-white" x-text="fmt(resumenGDS.tarifa)"></span>
                </div>
                <div class="flex justify-between items-center text-sm">
                    <span class="text-gray-400 font-medium">Total Impuestos GDS</span>
                    <span class="font-mono font-bold text-white" x-text="fmt(resumenGDS.impuestos)"></span>
                </div>
                <div class="h-px bg-gray-800 w-full my-2"></div>
                <div class="flex justify-between items-center text-base font-black text-blue-400">
                    <span>Neto Consolidado</span>
                    <span class="font-mono" x-text="fmt(resumenGDS.total)"></span>
                </div>
            </div>

            <!-- Calculadora Interactiva -->
            <div class="p-5 rounded-xl bg-[#0a140e] border border-primary/20 space-y-5">
                <!-- SELECCIÓN DE PAGADOR (CRM) -->
                <div class="space-y-3" x-data="{ 
                    search: '', results: [], selected: null, open: false,
                    async find() {
                        if(this.search.length < 3) { this.results = []; return; }
                        const res = await fetch(`/api/search/clientes/?q=${this.search}`);
                        const d = await res.json(); this.results = d.results || [];
                    }
                }">
                    <label class="block text-[10px] uppercase font-black text-primary tracking-widest mb-1">Cliente Pagador de la Reserva</label>
                    <div class="relative">
                        <input type="text" x-model="search" @input.debounce.300ms="find(); open = true" 
                               placeholder="Buscar pagador (Titular o Empresa)..."
                               class="w-full bg-[#111827] border border-gray-700 rounded-lg py-3 pl-10 pr-4 text-sm text-white focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-500">search</span>
                        <div x-show="open && results.length > 0" @click.away="open = false" class="absolute z-50 w-full mt-2 bg-[#1f2937] border border-gray-700 rounded-xl shadow-2xl max-h-40 overflow-y-auto">
                            <template x-for="c in results" :key="c.id">
                                <div @click="selected = c; open = false; search = c.text; $dispatch('set-pagador', c.id)" 
                                     class="p-3 hover:bg-primary/10 cursor-pointer border-b border-gray-800 last:border-none">
                                    <span class="text-sm font-bold text-white" x-text="c.text"></span>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] uppercase font-black text-primary tracking-widest mb-1 flex justify-between">
                            <span>Fee Mayorista</span>
                            <span class="text-slate-500 font-mono italic">(PAX)</span>
                        </label>
                        <input type="number" x-model.number="fProvPax" @input="recalc()" step="0.01" class="w-full bg-[#111827] border border-gray-700 rounded-lg py-2 px-3 text-sm font-mono text-white outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] uppercase font-black text-primary tracking-widest mb-1 flex justify-between">
                            <span>Fee Agencia</span>
                            <span class="text-slate-500 font-mono italic">(PAX)</span>
                        </label>
                        <input type="number" x-model.number="fIntPax" @input="recalc()" step="0.01" class="w-full bg-[#111827] border border-gray-700 rounded-lg py-2 px-3 text-sm font-mono text-white outline-none">
                    </div>
                </div>

                <div class="space-y-3 pt-2">
                    <div class="flex justify-between items-center text-xs text-slate-400 group">
                        <span class="flex items-center gap-1">Total Fees <span class="text-[9px] opacity-70" x-text="'(' + boletos.length + ' pax)'"></span></span>
                        <span class="font-mono font-bold" x-text="fmt((fProvPax + fIntPax) * boletos.length)"></span>
                    </div>
                    <div class="flex justify-between items-center text-xs text-pink-500">
                        <span>IGTF (3% Grupal)</span>
                        <span class="font-mono font-bold" x-text="fmt(igtf)"></span>
                    </div>
                    <div class="h-[1px] bg-primary/20 w-full"></div>
                    <div class="flex justify-between items-end">
                        <span class="text-xs font-black text-gray-300 uppercase tracking-widest">Total Venta ERP</span>
                        <span class="text-3xl font-black text-primary font-mono leading-none" x-text="fmt(totalFinal)"></span>
                    </div>
                </div>
            </div>
        </div>
    </div> 

    <!-- Acciones -->
    <div class="flex flex-col sm:flex-row gap-4 mt-2">
        <button type="button" @click="descargarFoto()" :disabled="processing"
                class="flex-1 py-4 bg-[#111827] border border-gray-700 rounded-xl text-white font-black hover:bg-gray-800 transition-all flex items-center justify-center gap-2 shadow-lg">
            <span class="material-symbols-outlined text-gray-400">photo_camera</span>
            <span x-text="btnFotoText"></span>
        </button>
        <button type="button" @click="inyectarERP()" :disabled="processing"
                class="flex-1 py-4 bg-primary text-[#0a140e] font-black rounded-xl hover:scale-105 transition-all flex items-center justify-center gap-2 glowing-border shadow-lg shadow-primary/20">
            <span class="material-symbols-outlined">bolt</span>
            <span x-text="btnErpText"></span>
        </button>
    </div>
</div>

<!-- Contenedor Alpine para el Modal Ctrl+K -->
<div x-data="{ searchOpen: false }" 
     @keydown.window="(e) => { if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); searchOpen = true; setTimeout(() => $refs.searchInput.focus(), 100) } }"
     @keydown.escape.window="searchOpen = false"
     @close-omnisearch.window="searchOpen = false"
     x-cloak>
    
    <!-- Trigger Visual (Botón que puedes poner en tu Navbar) -->
    <button @click="searchOpen = true; setTimeout(() => $refs.searchInput.focus(), 100)" 
            class="hidden md:flex items-center gap-2 bg-surface-2 border border-border-color text-text-muted hover:text-text-main px-4 py-2 rounded-xl text-sm font-medium transition-colors w-64 shadow-sm">
        <span class="material-symbols-outlined text-[18px]">search</span>
        <span>Buscar...</span>
        <span class="ml-auto flex items-center gap-1 text-[10px] font-bold bg-surface-1 px-2 py-0.5 rounded border border-border-color shadow-sm">
            <span class="material-symbols-outlined text-[10px]">keyboard_command_key</span> K
        </span>
    </button>

    <!-- Overlay y Modal de Búsqueda -->
    <div id="omnisearch-modal-overlay"
         x-show="searchOpen" 
         style="display: none;"
         x-cloak
         x-transition.opacity.duration.300ms
         class="hidden fixed inset-0 z-[110] flex items-start justify-center pt-10 sm:pt-24 px-4 bg-slate-900/80 backdrop-blur-md"
         @click.self="searchOpen = false"
         :style="searchOpen ? 'display: flex !important' : 'display: none !important'">
        
        <div x-show="searchOpen"
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 transform scale-95 -translate-y-4"
             x-transition:enter-end="opacity-100 transform scale-100 translate-y-0"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100 transform scale-100 translate-y-0"
             x-transition:leave-end="opacity-0 transform scale-95 -translate-y-4"
             @click.away="searchOpen = false"
             class="bg-surface-1 w-full max-w-2xl rounded-2xl shadow-2xl border border-border-color overflow-hidden flex flex-col max-h-[85vh] relative text-left">
            
            <!-- Botón de Cerrar Flotante para Móvil (Esquina superior derecha) -->
            <button @click="searchOpen = false" class="absolute top-4 right-4 md:hidden text-text-muted hover:text-text-main z-50 p-2">
                <span class="material-symbols-outlined text-3xl">close</span>
            </button>

            <!-- Barra de Input (HTMX acoplado) -->
            <div class="relative flex items-center p-4 border-b border-border-color bg-surface-2/50 pr-12 md:pr-4">
                <span class="material-symbols-outlined absolute left-6 text-blue-500 text-2xl">search</span>
                <input x-ref="searchInput" 
                       type="text" 
                       name="q"
                       placeholder="Buscar PNR, cliente..." 
                       autocomplete="off"
                       class="w-full bg-transparent border-none focus:ring-0 text-text-main text-lg pl-12 pr-4 outline-none placeholder-text-muted"
                       hx-get="{% url 'core:omnisearch' %}"
                       hx-trigger="keyup changed delay:300ms, search"
                       hx-target="#omnisearch-results"
                       hx-indicator="#search-spinner"
                       @keydown.escape="searchOpen = false">
                
                <div class="flex items-center gap-2">
                    <span id="search-spinner" class="htmx-indicator material-symbols-outlined animate-spin text-slate-400">sync</span>
                    <button @click="searchOpen = false" class="hidden md:block bg-surface-2 border border-border-color text-text-muted hover:text-text-main px-2 py-1 rounded-lg text-xs font-bold transition-colors shadow-sm">
                        ESC
                    </button>
                </div>
            </div>

            <!-- Contenedor de Resultados Dinámicos -->
            <div id="omnisearch-results" class="overflow-y-auto p-2 min-h-[150px]">
                <!-- Estado Inicial Vacío -->
                <div class="py-12 text-center">
                    <span class="material-symbols-outlined text-5xl text-slate-300 dark:text-slate-700 mb-4">travel_explore</span>
                    <p class="text-sm font-semibold text-text-muted">Busca en TravelHub...</p>
                    <p class="text-[10px] text-text-muted mt-2">PNRs, Facturas, Clientes, Boletos</p>
                </div>
            </div>
            
            <!-- Footer informativo -->
            <div class="p-3 bg-surface-2 border-t border-border-color flex justify-between items-center px-6 mt-auto">
                <p class="text-[10px] text-text-muted font-bold uppercase tracking-wider">OmniSearch v2.0</p>
                <div class="hidden sm:flex gap-4">
                     <span class="text-[10px] text-text-muted flex items-center gap-1"><span class="material-symbols-outlined text-[12px]">keyboard_return</span> Seleccionar</span>
                     <span class="text-[10px] text-text-muted flex items-center gap-1"><span class="material-symbols-outlined text-[12px]">keyboard_arrow_down</span> Navegar</span>
                </div>
            </div>
        </div>
    </div>
</div>

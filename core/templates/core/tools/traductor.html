{% extends 'base_modern.html' %}
{% load static %}

{% block content %}
<div class="container mx-auto px-4 py-6" x-data="traductorApp()">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-gray-800">
            <i class="fas fa-language mr-2 text-blue-600"></i>Traductor de Itinerarios
        </h1>
        <div class="text-sm text-gray-500">
            Motor: TravelHub Core Parser v2.0
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 h-[calc(100vh-150px)]">
        <!-- Panel Izquierdo: Entrada -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col">
            <div class="p-4 border-b border-gray-100 bg-gray-50 rounded-t-xl flex justify-between items-center">
                <h2 class="font-semibold text-gray-900">Texto Original (GDS)</h2>
                <button @click="limpiar()" class="text-xs text-red-500 hover:text-red-700 font-medium">
                    <i class="fas fa-trash mr-1"></i>Limpiar
                </button>
            </div>
            <div class="flex-1 p-4">
                <textarea x-model="inputText"
                    class="w-full h-full p-4 font-mono text-sm text-gray-900 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none"
                    placeholder="Pegue aquí el itinerario de Sabre, Amadeus o KIU..."></textarea>
            </div>
            <div class="p-4 border-t border-gray-100">
                <button @click="traducir()"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 flex justify-center items-center"
                    :disabled="loading">
                    <span x-show="loading"><i class="fas fa-spinner fa-spin mr-2"></i>Procesando...</span>
                    <span x-show="!loading"><i class="fas fa-magic mr-2"></i>Traducir Itinerario</span>
                </button>
            </div>
        </div>

        <!-- Panel Derecho: Resultados y Calculadora -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col overflow-hidden">
            <!-- Tabs -->
            <div class="flex border-b border-gray-200">
                <button @click="activeTab = 'itinerario'"
                    class="flex-1 py-3 px-4 text-sm font-medium text-center transition-colors duration-200"
                    :class="activeTab === 'itinerario' ? 'text-blue-600 border-b-2 border-blue-600 bg-blue-50' : 'text-gray-500 hover:text-gray-700'">
                    <i class="fas fa-plane mr-2"></i>Itinerario
                </button>
                <button @click="activeTab = 'calculadora'"
                    class="flex-1 py-3 px-4 text-sm font-medium text-center transition-colors duration-200"
                    :class="activeTab === 'calculadora' ? 'text-green-600 border-b-2 border-green-600 bg-green-50' : 'text-gray-500 hover:text-gray-700'">
                    <i class="fas fa-calculator mr-2"></i>Calculadora
                </button>
            </div>

            <!-- Tab Content: Itinerario -->
            <div x-show="activeTab === 'itinerario'" class="flex-1 overflow-y-auto p-4 bg-gray-50">
                <div x-show="!translatedHtml" class="h-full flex flex-col items-center justify-center text-gray-400">
                    <i class="fas fa-arrow-left text-4xl mb-4"></i>
                    <p>Procese un itinerario para ver el resultado aquí.</p>
                </div>
                <div x-show="translatedHtml" class="bg-white rounded-lg shadow-sm border border-gray-200 p-4">
                    <div class="flex justify-end mb-2 gap-2">
                        <button @click="crearCotizacion()"
                            class="text-xs bg-green-600 hover:bg-green-700 text-white font-bold px-3 py-1 rounded transition flex items-center shadow-sm"
                            :disabled="creatingQuote">
                            <i x-show="!creatingQuote" class="fas fa-file-invoice-dollar mr-1"></i>
                            <i x-show="creatingQuote" class="fas fa-spinner fa-spin mr-1"></i>
                            <span x-text="creatingQuote ? 'Creando...' : 'Crear Cotización'"></span>
                        </button>
                        <button @click="copiarItinerario()"
                            class="text-xs bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1 rounded transition border border-gray-300">
                            <i class="fas fa-copy mr-1"></i>Copiar HTML
                        </button>
                    </div>
                    <div id="resultado-itinerario" x-html="translatedHtml" class="space-y-2"></div>
                </div>
            </div>

            <!-- Tab Content: Calculadora -->
            <div x-show="activeTab === 'calculadora'" class="flex-1 overflow-y-auto p-6">
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Tarifa Base ($)</label>
                        <input type="number" x-model.number="calc.tarifa" @input="calcular()"
                            class="w-full p-2 border rounded-lg text-gray-900">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-medium text-gray-700 mb-1">Fee Consolidador ($)</label>
                            <input type="number" x-model.number="calc.feeConsolidador" @input="calcular()"
                                class="w-full p-2 border rounded-lg text-gray-900">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-700 mb-1">Fee Agencia ($)</label>
                            <input type="number" x-model.number="calc.feeInterno" @input="calcular()"
                                class="w-full p-2 border rounded-lg text-gray-900">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">% Ganancia Adicional</label>
                        <input type="number" x-model.number="calc.porcentaje" @input="calcular()"
                            class="w-full p-2 border rounded-lg text-gray-900">
                    </div>

                    <div class="mt-6 p-4 bg-gray-50 rounded-lg border border-gray-200 space-y-2">
                        <div class="flex justify-between text-sm text-gray-600">
                            <span>Subtotal:</span>
                            <span x-text="formatMoney(resultadoCalc.subtotal)"></span>
                        </div>
                        <div class="flex justify-between text-sm text-gray-600">
                            <span>IGTF (3%):</span>
                            <span x-text="formatMoney(resultadoCalc.igtf)"></span>
                        </div>
                        <div
                            class="border-t border-gray-200 pt-2 flex justify-between font-bold text-lg text-green-700">
                            <span>Total a Pagar:</span>
                            <span x-text="formatMoney(resultadoCalc.total)"></span>
                        </div>
                        <div class="text-xs text-gray-400 text-center mt-2">
                            Tasa BCV: <span x-text="tasaBcv"></span> Bs/USD (Ref)
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script nonce="{{ request.META.CSP_NONCE }}">
    function traductorApp() {
        return {
            inputText: '',
            translatedHtml: '',
            loading: false,
            activeTab: 'itinerario',
            tasaBcv: '{{ tasa_bcv|default:"0.00" }}',
            calc: {
                tarifa: 0,
                feeConsolidador: 0,
                feeInterno: 0,
                porcentaje: 0
            },
            resultadoCalc: {
                subtotal: 0,
                igtf: 0,
                total: 0
            },

            structuredData: [],
            creatingQuote: false,

            async traducir() {
                if (!this.inputText.trim()) return;

                this.loading = true;
                try {
                    const response = await fetch('/api/translator/itinerary/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': '{{ csrf_token }}'
                        },
                        body: JSON.stringify({ itinerary: this.inputText })
                    });

                    const data = await response.json();
                    if (data.success) {
                        this.translatedHtml = data.translated_itinerary;
                        this.structuredData = data.structured_data || [];
                        this.activeTab = 'itinerario';
                    } else {
                        alert('Error: ' + (data.error || 'No se pudo traducir'));
                    }
                } catch (e) {
                    console.error(e);
                    alert('Error de conexión');
                } finally {
                    this.loading = false;
                }
            },

            async crearCotizacion() {
                if (!this.structuredData || this.structuredData.length === 0) {
                    alert('No hay datos estructurados disponibles. Por favor traduzca un itinerario válido primero.');
                    return;
                }

                this.creatingQuote = true;
                try {
                    const response = await fetch('/api/translator/create-quote/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': '{{ csrf_token }}'
                        },
                        body: JSON.stringify({ structured_data: this.structuredData })
                    });

                    const data = await response.json();
                    if (data.success) {
                        // Redirigir a la cotización creada
                        window.location.href = data.redirect_url;
                    } else {
                        alert('Error: ' + (data.error || 'No se pudo crear la cotización'));
                    }
                } catch (e) {
                    console.error(e);
                    alert('Error al conectar con el servidor');
                } finally {
                    this.creatingQuote = false;
                }
            },

            calcular() {
                const base = this.calc.tarifa + this.calc.feeConsolidador + this.calc.feeInterno;
                const ganancia = base * (this.calc.porcentaje / 100);
                const subtotal = base + ganancia;
                const igtf = subtotal * 0.03;

                this.resultadoCalc = {
                    subtotal: subtotal,
                    igtf: igtf,
                    total: subtotal + igtf
                };
            },

            formatMoney(amount) {
                return '$' + amount.toFixed(2);
            },

            limpiar() {
                this.inputText = '';
                this.translatedHtml = '';
                this.structuredData = [];
                this.calc = { tarifa: 0, feeConsolidador: 0, feeInterno: 0, porcentaje: 0 };
                this.calcular();
            },

            copiarItinerario() {
                // Copia simple del texto (se puede mejorar para copiar HTML enriquecido)
                const el = document.getElementById('resultado-itinerario');
                const range = document.createRange();
                range.selectNode(el);
                window.getSelection().removeAllRanges();
                window.getSelection().addRange(range);
                document.execCommand('copy');
                window.getSelection().removeAllRanges();

                // Feedback visual pequeño
                const btn = event.currentTarget;
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check mr-1"></i>Copiado';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                }, 2000);
            }
        }
    }
</script>
{% endblock %}

<div class="bg-surface-1/90 backdrop-blur-md border border-blue-500/30 p-4 rounded-t-2xl shadow-[0_-10px_30px_rgba(59,130,246,0.1)] animate-fade-in-up">
    <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-[16px] text-blue-400 animate-pulse">auto_awesome</span>
            <span class="text-[10px] font-black text-blue-400 uppercase tracking-widest">Sugerencias Generativas</span>
        </div>
        <button onclick="document.getElementById('ai-suggestions').innerHTML = ''" class="text-text-muted hover:text-white transition-colors">
            <span class="material-symbols-outlined text-[14px]">close</span>
        </button>
    </div>
    
    <div class="flex gap-2 overflow-x-auto hide-scrollbar">
        {% for sugerencia in sugerencias %}
        <button type="button" 
                @click="useSuggestion('{{ sugerencia|escapejs }}')" 
                class="shrink-0 bg-surface-2 hover:bg-slate-800 border border-border-color hover:border-blue-500 text-text-main text-xs font-medium py-2.5 px-4 rounded-xl transition-all shadow-sm text-left max-w-xs truncate">
            "{{ sugerencia|truncatechars:100 }}"
        </button>
        {% endfor %}
    </div>
</div>

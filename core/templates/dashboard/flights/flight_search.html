{% extends "base_modern.html" %}
{% load static %}

{% block content %}
<div class="min-h-screen bg-[#0f172a] text-white p-6 font-sans">
    
    <!-- Header -->
    <div class="mb-8">
        <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-cyan-300">
            Cotizador Aéreo GDS
        </h1>
        <p class="text-gray-400 mt-2">Busca vuelos en tiempo real con Amadeus.</p>
    </div>

    <!-- Buscador -->
    <div class="bg-slate-800/50 border border-slate-700 rounded-2xl p-6 shadow-xl mb-8">
        <form hx-post="{% url 'core:flight_search' %}" 
              hx-target="#flight-results" 
              hx-indicator="#loading-indicator"
              class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
            {% csrf_token %}
            
            <!-- Origen -->
            <div>
                <label class="block text-gray-400 text-sm mb-1">Origen (IATA)</label>
                <div class="relative">
                    <span class="absolute left-3 top-3 text-gray-500">🛫</span>
                    <input type="text" name="origin" placeholder="Ej: CCS" required maxlength="3"
                           class="w-full bg-slate-900 border border-slate-600 rounded-lg py-2.5 pl-10 pr-4 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 uppercase font-mono">
                </div>
            </div>

            <!-- Destino -->
            <div>
                <label class="block text-gray-400 text-sm mb-1">Destino (IATA)</label>
                <div class="relative">
                    <span class="absolute left-3 top-3 text-gray-500">🛬</span>
                    <input type="text" name="destination" placeholder="Ej: MAD" required maxlength="3"
                           class="w-full bg-slate-900 border border-slate-600 rounded-lg py-2.5 pl-10 pr-4 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 uppercase font-mono">
                </div>
            </div>

            <!-- Fecha -->
            <div>
                <label class="block text-gray-400 text-sm mb-1">Fecha Ida</label>
                <div class="relative">
                    <span class="absolute left-3 top-3 text-gray-500">📅</span>
                    <input type="date" name="date" required
                           class="w-full bg-slate-900 border border-slate-600 rounded-lg py-2.5 pl-10 pr-4 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 [color-scheme:dark]">
                </div>
            </div>

            <!-- Botón Buscar -->
            <div>
                <button type="submit" 
                        class="w-full bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-500 hover:to-cyan-400 text-white font-bold py-2.5 px-4 rounded-lg shadow-lg hover:shadow-cyan-500/20 transition-all transform hover:-translate-y-0.5 flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    Buscar Vuelos
                </button>
            </div>
        </form>
    </div>

    <!-- Loading -->
    <div id="loading-indicator" class="htmx-indicator flex justify-center py-12">
        <div class="flex flex-col items-center gap-3">
            <svg class="animate-spin h-10 w-10 text-cyan-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span class="text-cyan-400 animate-pulse">Conectando con Amadeus GDS...</span>
        </div>
    </div>

    <!-- Resultados -->
    <div id="flight-results" class="space-y-4">
        <!-- Aquí se inyectarán las tarjetas HTMX -->
        <div class="text-center text-gray-500 py-12">
            <svg class="w-16 h-16 mx-auto mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <p>Ingresa ruta y fecha para ver ofertas disponibles</p>
        </div>
    </div>

</div>
{% endblock %}

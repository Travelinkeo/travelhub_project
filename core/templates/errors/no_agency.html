{% extends "base_modern.html" %}
{% load i18n %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
    <div class="max-w-md w-full text-center space-y-6 p-8 bg-white dark:bg-slate-800 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-700">
        <div class="w-20 h-20 bg-amber-100 dark:bg-amber-900/30 rounded-2xl flex items-center justify-center mx-auto mb-4">
            <svg class="w-10 h-10 text-amber-600 dark:text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
        </div>
        
        <h1 class="text-2xl font-bold text-slate-900 dark:text-white">
            {% trans "Sin Agencia Activa" %}
        </h1>
        
        <p class="text-slate-600 dark:text-slate-400">
            {{ message|default:_("Tu cuenta no tiene una agencia activa asociada. Contacta al administrador para que te asigne a una sucursal.") }}
        </p>

        <div class="pt-4">
            <a href="{% url 'logout' %}" class="inline-flex items-center justify-center px-6 py-2.5 border border-transparent text-base font-medium rounded-xl text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all">
                {% trans "Cerrar Sesión" %}
            </a>
        </div>
    </div>
</div>
{% endblock %}

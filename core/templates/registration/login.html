{% load static %}
<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - TravelHub Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-20px);
            }

            100% {
                transform: translateY(0px);
            }
        }
    </style>
</head>

<body class="bg-slate-900 h-screen w-full flex items-center justify-center relative overflow-hidden text-white">

    <!-- Background Effects -->
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/20 rounded-full blur-[120px] animate-pulse">
    </div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-600/20 rounded-full blur-[120px] animate-pulse"
        style="animation-delay: 2s;"></div>

    <!-- Login Container -->
    <div class="relative w-full max-w-md p-8 glass-panel rounded-3xl shadow-2xl mx-4">

        <!-- Logo -->
        <div class="text-center mb-8">
            <div
                class="bg-white/5 p-4 rounded-3xl inline-block mb-4 shadow-lg backdrop-blur-sm border border-white/10 hover:bg-white/10 transition duration-300">
                <img src="{% static 'images/Logo TravelHub.png' %}" alt="TravelHub Logo"
                    class="h-24 w-auto object-contain mx-auto drop-shadow-md">
            </div>
            <!-- Subtitle removed as requested to let logo stand alone, or keep descriptive text if preferred -->
            <p class="text-gray-400 text-sm font-medium tracking-wide">Plataforma de Gestión Integral</p>
        </div>

        {% if form.errors %}
        <div class="mb-6 p-4 rounded-xl bg-red-500/10 border border-red-500/20 flex items-start gap-3">
            <svg class="w-5 h-5 text-red-500 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor"
                viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <p class="text-sm text-red-200">Credenciales inválidas. Por favor intente de nuevo.</p>
        </div>
        {% endif %}

        <form method="post" class="space-y-6">
            {% csrf_token %}

            <!-- Username -->
            <div class="space-y-2">
                <label class="text-sm font-medium text-gray-300 ml-1">Usuario</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-500 group-focus-within:text-blue-400 transition-colors"
                            fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                    <input type="text" name="username" autofocus required
                        class="block w-full pl-11 pr-4 py-3 bg-slate-800/50 border border-slate-700 rounded-xl text-white placeholder-gray-500 focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none"
                        placeholder="Ingresa tu usuario">
                </div>
            </div>

            <!-- Password -->
            <div class="space-y-2">
                <label class="text-sm font-medium text-gray-300 ml-1">Contraseña</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-500 group-focus-within:text-blue-400 transition-colors"
                            fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                    </div>
                    <input type="password" name="password" required
                        class="block w-full pl-11 pr-4 py-3 bg-slate-800/50 border border-slate-700 rounded-xl text-white placeholder-gray-500 focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none"
                        placeholder="••••••••">
                </div>
            </div>

            <!-- Actions -->
            <div class="flex items-center justify-between pt-2">
                <label
                    class="flex items-center space-x-2 text-sm text-gray-400 cursor-pointer hover:text-white transition-colors">
                    <input type="checkbox"
                        class="form-checkbox h-4 w-4 bg-slate-800 border-slate-600 rounded text-blue-500 focus:ring-blue-500 focus:ring-offset-slate-900">
                    <span>Recordarme</span>
                </label>
                <a href="#" class="text-sm text-blue-400 hover:text-blue-300 transition-colors">¿Olvidaste tu clave?</a>
            </div>

            <button type="submit"
                class="w-full py-3.5 px-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold rounded-xl shadow-lg shadow-blue-500/25 transform transition hover:-translate-y-0.5 focus:ring-4 focus:ring-blue-500/20">
                Iniciar Sesión
            </button>
        </form>

        <!-- Footer -->
        <div class="mt-8 pt-6 border-t border-white/5 text-center">
            <p class="text-xs text-slate-500">© 2026 TravelHub Pro. Todos los derechos reservados.</p>
        </div>
    </div>

</body>

</html>

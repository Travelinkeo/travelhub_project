<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diseñador de Flyers TravelHub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-900 text-white min-h-screen flex flex-col p-4">

    <div class="flex-grow">
        <h1 class="text-2xl font-bold mb-6 text-center text-teal-400">🎨 Diseñar Flyer</h1>

        <div class="space-y-4">
            <!-- Destino -->
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Destino</label>
                <input type="text" id="destination" placeholder="Ej: París, Madrid"
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 focus:border-teal-500 focus:outline-none transition">
            </div>

            <!-- Precio -->
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Precio (USD/EUR)</label>
                <input type="number" id="price" placeholder="Ej: 850"
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 focus:border-teal-500 focus:outline-none transition">
            </div>

            <!-- Aerolínea (Opcional) -->
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Aerolínea (Opcional)</label>
                <input type="text" id="airline" placeholder="Ej: Air Europa"
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 focus:border-teal-500 focus:outline-none transition">
            </div>

            <!-- Preview Texto -->
            <div id="preview" class="hidden mt-6 p-4 bg-gray-800 rounded-lg border border-gray-700 text-center">
                <p class="text-sm text-gray-400">Vista Previa:</p>
                <p class="text-xl font-bold text-white mt-1" id="previewText"></p>
                <p class="text-2xl font-bold text-teal-400 mt-1" id="previewPrice"></p>
            </div>
        </div>
    </div>

    <!-- Main Button handled by Telegram usually, but we can add one for web testing -->
    <!-- OCULTO POR DEFECTO para evitar doble botón en Telegram -->
    <button id="mainBtn" style="display: none;"
        class="w-full bg-teal-500 hover:bg-teal-600 text-white font-bold py-4 rounded-xl shadow-lg transition transform active:scale-95">
        ✨ GENERAR FLYER
    </button>

    <script nonce="{{ csp_nonce }}">
        try {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();

            // Helper para obtener params URL
            function getUrlParameter(name) {
                name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
                var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
                var results = regex.exec(location.search);
                return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
            }

            const destinationInput = document.getElementById('destination');
            const priceInput = document.getElementById('price');
            const airlineInput = document.getElementById('airline');

            // Main Button Logic
            async function sendData() {
                const dest = destinationInput.value.trim();
                const price = priceInput.value.trim();
                const airline = airlineInput.value.trim();

                if (!dest || !price) {
                    tg.showPopup({
                        title: 'Faltan datos',
                        message: 'Por favor ingresa al menos el Destino y el Precio.',
                        buttons: [{ type: 'ok' }]
                    });
                    return;
                }

                // Obtener ID (Prioridad: URL > Telegram > 0)
                const uidUrl = getUrlParameter('uid');
                let userId = uidUrl ? parseInt(uidUrl) : 0;

                if (!userId && tg.initDataUnsafe && tg.initDataUnsafe.user) {
                    userId = tg.initDataUnsafe.user.id;
                }

                const data = {
                    user_id: userId,
                    destination: dest,
                    price: price,
                    airline: airline
                };

                // Enviar datos al Backend (AJAX)
                tg.MainButton.showProgress();

                try {
                    const response = await fetch('/api/generate-flyer/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(data)
                    });

                    const result = await response.json();

                    if (response.ok) {
                        tg.MainButton.setText("✅ ENVIADO");
                        tg.close();
                    } else {
                        throw new Error(result.error || 'Error desconocido en servidor');
                    }

                } catch (e) {
                    tg.showPopup({
                        title: 'Error',
                        message: 'No se pudo generar el flyer: ' + e.message
                    });
                    tg.MainButton.setText("✨ GENERAR FLYER");
                    tg.MainButton.hideProgress();
                }
            }

            // Asignar Event Listeners (CSP Friendly)
            document.getElementById('mainBtn').addEventListener('click', sendData);

            // Configurar botón principal de Telegram (más nativo)
            tg.MainButton.setText("✨ GENERAR FLYER");
            tg.MainButton.show();
            tg.MainButton.onClick(sendData);

            // ELIMINADO: Bloque que mostraba button HTML si no habia initData. 
            // Esto asegura que NUNCA salga el doble boton.

        } catch (err) {
            console.error("Error crítico JS: " + err.message);
        }

    </script>
</body>

</html>

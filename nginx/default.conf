upstream django_web {
    server web:8000;
}

server {
    listen 80 default_server;
    server_name _;

    # Aumentar el límite de subida para permitir PDFs y EMLs pesados (50MB)
    client_max_body_size 50M;

    # Archivos Estáticos (CSS, JS, Fuentes)
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Archivos Multimedia (Logos de agencias, Comprobantes Zelle)
    location /media/ {
        alias /app/media/;
        expires 30d;
    }

    # Proxy a Django (Gunicorn)
    location / {
        proxy_pass http://web:8000;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
        
        # Soporte para WebSockets / HTMX largo
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
    }
}
